# Pre-commit hooks. Enable locally with `pre-commit install` — or just run
# `nix develop`, which installs the hook automatically.
#
# The gitleaks hook is a `system` hook: it calls the gitleaks binary on PATH
# (provided by the dev shell and by CI), so there is no Go build step.
repos:
  - repo: local
    hooks:
      # --- Security: secret scanning ---
      - id: gitleaks
        name: gitleaks (scan staged changes for secrets)
        description: Detect hardcoded secrets before they are committed.
        entry: gitleaks protect --staged --redact --verbose
        language: system
        pass_filenames: false

      # --- Nix linting ---
      - id: statix
        name: statix (nix anti-pattern lint)
        entry: statix check
        language: system
        pass_filenames: false
        types: [nix]
      - id: deadnix
        name: deadnix (unused nix code)
        entry: deadnix --fail
        language: system
        types: [nix]
