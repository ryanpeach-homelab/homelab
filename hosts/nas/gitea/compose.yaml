version: "3"

services:
  server:
    image: gitea/gitea:1.22.1
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__APP_NAME=Gitea
      - GITEA__database__DB_TYPE=mysql
      - GITEA__database__HOST=db:3306
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD__FILE=/run/secrets/root_password
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__PROTOCOL=http
      - GITEA__server__DOMAIN=nas.local
      - GITEA__server__ROOT_URL=http://nas.local:11080
      - GITEA__server__SSH_DOMAIN=nas.local
      - GITEA__server__SSH_PORT=11022
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__repository__ENABLE_PUSH_CREATE_USER=true
      - GITEA__repository__ENABLE_PUSH_CREATE_ORG=true
      - GITEA__repository__ALLOW_ADOPTION_OF_UNADOPTED_REPOSITORIES=true
      - GITEA__repository__ROOT=/data/git/repositories
      - GITEA__repository__DISABLE_HTTP_GIT=true
      - GITEA__metrics__ENABLED=true
      - GITEA__server__LFS_START_SERVER=true
      - GITEA__lfs__PATH=/data/git/lfs
    restart: always
    volumes:
      - /volume1/docker/gitea/data:/data
    ports:
      - "11080:3000" # HTTP access
      - "11022:22"   # SSH access
    secrets:
      - root_password
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: gitea_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
      - MYSQL_USER=gitea
      - MYSQL_PASSWORD_FILE=/run/secrets/root_password
      - MYSQL_DATABASE=gitea
    volumes:
      - /volume1/docker/gitea/mysql:/var/lib/mysql
    secrets:
      - root_password
      - db_root_password

secrets:
  root_password:
    file: ./root_password.txt
  db_root_password:
    file: ./db_root_password.txt
